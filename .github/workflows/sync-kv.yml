name: Generate and Sync Ivan-FluX to Cloudflare KV

on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিটে অটো রান হবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার জন্য
  repository_dispatch:    # বাইরের ট্রিগার শোনার জন্য
    types: [manual_push]

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ধাপ ১: পাইথন স্ক্রিপ্ট রান করে প্লেইন Ivan-FluX.json জেনারেট করা
      - name: Run Data Generator
        env:
          LIVXOW_URL: ${{ secrets.LIVXOW_URL }}
        run: python main.py

      # ধাপ ২: জেনারেট হওয়া ফাইলটি সরাসরি Cloudflare KV-তে আপলোড করা
      - name: Upload to Cloudflare KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -f "Ivan-FluX.json" ]; then
            echo "Uploading Ivan-FluX.json to Cloudflare KV..."
            
            response=$(curl -s -w "%{http_code}" -o response.json -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/ivan-flux" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"Ivan-FluX.json")
            
            if [ "$response" -eq 200 ]; then
              echo "Successfully uploaded to Cloudflare KV under key 'ivan-flux'."
            else
              echo "Failed to upload to Cloudflare KV. HTTP Status: $response"
              cat response.json
              exit 1
            fi
          else
            echo "Error: Ivan-FluX.json was not generated by Python script!"
            exit 1
          fi

      # ধাপ ৩: গিটহাবে ব্যাকআপ হিসেবে প্লেইন ফাইলটি পুশ করা
      - name: Commit and Push Changes to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Ivan-FluX.json
          git commit -m "Update Ivan-FluX.json (Plain JSON) [Skip CI]" || exit 0
          git push
